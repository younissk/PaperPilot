# AWS CodeBuild buildspec for PaperPilot
# This file defines the build and deploy process for SAM applications
# via CodePipeline (GitHub source → CodeBuild → SAM deploy)

version: 0.2

env:
  variables:
    # SAM configuration
    SAM_CLI_TELEMETRY: 0
    # Python version (must match Lambda runtime)
    PYTHON_VERSION: "3.13"
    # Note: OPENAI_API_KEY should be set as Lambda environment variable after deployment
    # or fetched from Secrets Manager at runtime. Not needed during build.

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      # Install SAM CLI
      - pip install --upgrade pip
      - pip install aws-sam-cli
      # Verify installations
      - sam --version
      - python --version

  pre_build:
    commands:
      # Copy paperpilot package to both services for shared utilities
      # API uses: paperpilot.aws (shared helpers)
      # Worker uses: paperpilot.aws + paperpilot.core (pipeline processing)
      - echo "Copying paperpilot package to services..."
      - cp -r paperpilot services/api/
      - cp -r paperpilot services/worker/
      - echo "Verifying service directories..."
      - ls -la services/api/
      - ls -la services/api/paperpilot/
      - ls -la services/worker/
      - ls -la services/worker/paperpilot/
      # Verify frontend directory
      - echo "Verifying frontend directory..."
      - ls -la frontend/

  build:
    commands:
      - echo "Building SAM application..."
      # Build and deploy in one block to maintain working directory
      - |
        cd infra
        sam build --use-container --parallel
        echo "Build complete, deploying..."
        
        # Create ECR repository for frontend if it doesn't exist (avoids problematic CompanionStack)
        ECR_REPO="paperpilot-frontend"
        AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
        AWS_REGION="eu-central-1"
        ECR_URI="${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
        
        echo "Ensuring ECR repository exists: ${ECR_REPO}"
        aws ecr describe-repositories --repository-names ${ECR_REPO} 2>/dev/null || \
          aws ecr create-repository --repository-name ${ECR_REPO} --image-scanning-configuration scanOnPush=true
        
        # Clean up any failed stacks (ROLLBACK_COMPLETE state cannot be updated)
        echo "Checking for failed stacks..."
        FAILED_STACKS=$(aws cloudformation list-stacks --stack-status-filter ROLLBACK_COMPLETE --query "StackSummaries[?contains(StackName, 'paperpilot')].StackName" --output text 2>/dev/null || true)
        if [ -n "$FAILED_STACKS" ]; then
          for STACK in $FAILED_STACKS; do
            echo "Deleting failed stack: $STACK"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" || true
          done
        fi
        
        # Deploy with explicit ECR repository (bypasses CompanionStack)
        sam deploy --config-file samconfig.toml --config-env default \
          --no-fail-on-empty-changeset \
          --image-repository "${ECR_URI}"

artifacts:
  files:
    - infra/template.yaml
    - infra/samconfig.toml
  discard-paths: no

cache:
  paths:
    # Cache pip packages to speed up builds
    - "/root/.cache/pip/**/*"
    # Cache SAM build artifacts
    - "infra/.aws-sam/**/*"
