# AWS CodeBuild buildspec for PaperPilot
# This file defines the build and deploy process for SAM applications
# via CodePipeline (GitHub source → CodeBuild → SAM deploy)

version: 0.2

env:
  variables:
    # SAM configuration
    SAM_CLI_TELEMETRY: 0
    # Python version (must match Lambda runtime)
    PYTHON_VERSION: "3.13"
  parameter-store:
    # Store your OpenAI API key in SSM Parameter Store
    # Create it: aws ssm put-parameter --name /paperpilot/openai-api-key --value "sk-..." --type SecureString
    OPENAI_API_KEY: /paperpilot/openai-api-key

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      # Install SAM CLI
      - pip install --upgrade pip
      - pip install aws-sam-cli
      # Verify installations
      - sam --version
      - python --version

  pre_build:
    commands:
      # Copy the paperpilot package to each service directory
      # This is needed because SAM packages each function from its CodeUri
      - echo "Copying paperpilot package to service directories..."
      - cp -r paperpilot services/api/
      - cp -r paperpilot services/worker/
      # Verify the copy
      - ls -la services/api/
      - ls -la services/worker/

  build:
    commands:
      - echo "Building SAM application..."
      - cd infra && sam build --use-container --parallel
      # The --use-container flag builds inside a Lambda-like Docker container
      # This ensures dependencies are compiled for the Lambda runtime

  post_build:
    commands:
      - echo "Deploying SAM application..."
      - cd infra && sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
      # --no-confirm-changeset: Don't prompt for confirmation (CI/CD)
      # --no-fail-on-empty-changeset: Don't fail if there are no changes

artifacts:
  files:
    - infra/template.yaml
    - infra/samconfig.toml
  discard-paths: no

cache:
  paths:
    # Cache pip packages to speed up builds
    - '/root/.cache/pip/**/*'
    # Cache SAM build artifacts
    - 'infra/.aws-sam/**/*'
