# AWS CodeBuild buildspec for deploying to production
# This stage builds and deploys the SAM application to the production environment.
# Should only run after staging E2E tests pass and (optionally) manual approval.

version: 0.2

env:
  variables:
    PYTHON_VERSION: "3.13"
    SAM_CLI_TELEMETRY: 0
    DEPLOY_ENV: prod

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing SAM CLI..."
      - pip install --upgrade pip
      - pip install aws-sam-cli
      - sam --version

  pre_build:
    commands:
      - echo "Copying paperpilot package to worker service..."
      - cp -r paperpilot services/worker/
      - echo "Verifying service directories..."
      - ls -la services/api/
      - ls -la services/worker/

  build:
    commands:
      - echo "Building SAM application..."
      - cd infra && sam build --use-container --parallel

      - echo "Deploying to production environment..."
      - |
        cd infra
        sam deploy \
          --config-file samconfig.toml \
          --config-env prod \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset

      - echo "Capturing production API URL..."
      - |
        cd infra
        PROD_API_URL=$(aws cloudformation describe-stacks \
          --stack-name paperpilot \
          --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
          --output text)
        echo "PROD_API_URL=$PROD_API_URL" >> $CODEBUILD_SRC_DIR/prod-env.txt
        echo "Production API URL: $PROD_API_URL"

  post_build:
    commands:
      - echo "Production deployment completed!"
      - cat prod-env.txt || true

artifacts:
  files:
    - prod-env.txt
    - infra/template.yaml
    - infra/samconfig.toml
  discard-paths: no

cache:
  paths:
    - "/root/.cache/pip/**/*"
    - "infra/.aws-sam/**/*"
