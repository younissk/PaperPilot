# AWS CodeBuild buildspec for running E2E tests against staging
# This stage runs end-to-end tests against the deployed staging environment.
# Requires STAGING_API_URL to be set (from previous deploy stage).

version: 0.2

env:
  variables:
    PYTHON_VERSION: "3.13"
    AWS_DEFAULT_REGION: eu-central-1

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing uv package manager..."
      - pip install --upgrade pip
      - pip install uv
      - uv --version

  pre_build:
    commands:
      - echo "Installing test dependencies..."
      - uv sync --all-extras

      - echo "Loading staging environment..."
      - |
        if [ -f staging-env.txt ]; then
          source staging-env.txt
          export STAGING_API_URL
          echo "STAGING_API_URL: $STAGING_API_URL"
        else
          # Try to get from CloudFormation
          STAGING_API_URL=$(aws cloudformation describe-stacks \
            --stack-name paperpilot-staging \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          export STAGING_API_URL
          echo "STAGING_API_URL (from CFN): $STAGING_API_URL"
        fi

      - echo "Verifying staging API is accessible..."
      - |
        curl -sf "$STAGING_API_URL/api/health" || {
          echo "ERROR: Staging API not accessible"
          exit 1
        }

  build:
    commands:
      - echo "Running E2E tests against staging..."
      - |
        export STAGING_API_URL=$(aws cloudformation describe-stacks \
          --stack-name paperpilot-staging \
          --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
          --output text)
        echo "Testing against: $STAGING_API_URL"

        # Run E2E tests (skip slow tests in CI by default)
        uv run pytest tests/e2e/ -v --tb=short -m "e2e and not slow" \
          --junitxml=e2e-results.xml

  post_build:
    commands:
      - echo "E2E tests completed!"
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "All E2E tests passed - ready for production deployment"
        else
          echo "E2E tests failed - blocking production deployment"
        fi

reports:
  e2e-reports:
    files:
      - "e2e-results.xml"
    file-format: JUNITXML
    base-directory: .

cache:
  paths:
    - "/root/.cache/pip/**/*"
    - "/root/.cache/uv/**/*"
    - ".venv/**/*"
