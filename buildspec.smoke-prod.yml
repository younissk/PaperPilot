# AWS CodeBuild buildspec for running smoke tests against production
# This stage runs fast, non-destructive tests to verify production health.
# Runs immediately after production deployment.

version: 0.2

env:
  variables:
    PYTHON_VERSION: "3.13"
    AWS_DEFAULT_REGION: eu-central-1

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing uv package manager..."
      - pip install --upgrade pip
      - pip install uv
      - uv --version

  pre_build:
    commands:
      - echo "Installing test dependencies..."
      - uv sync --all-extras

      - echo "Loading production environment..."
      - |
        if [ -f prod-env.txt ]; then
          source prod-env.txt
          export PROD_API_URL
          echo "PROD_API_URL: $PROD_API_URL"
        else
          # Try to get from CloudFormation
          PROD_API_URL=$(aws cloudformation describe-stacks \
            --stack-name paperpilot \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          export PROD_API_URL
          echo "PROD_API_URL (from CFN): $PROD_API_URL"
        fi

  build:
    commands:
      - echo "Running smoke tests against production..."
      - |
        export PROD_API_URL=$(aws cloudformation describe-stacks \
          --stack-name paperpilot \
          --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
          --output text)
        echo "Testing against: $PROD_API_URL"

        # Run smoke tests (excluding optional tests that create jobs)
        uv run pytest tests/smoke/ -v --tb=short -m "smoke and not optional" \
          --junitxml=smoke-results.xml

  post_build:
    commands:
      - echo "Smoke tests completed!"
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "Production deployment verified - all smoke tests passed!"
        else
          echo "WARNING: Smoke tests failed - production may have issues"
          # Consider triggering rollback or alerts here
        fi

reports:
  smoke-reports:
    files:
      - "smoke-results.xml"
    file-format: JUNITXML
    base-directory: .

cache:
  paths:
    - "/root/.cache/pip/**/*"
    - "/root/.cache/uv/**/*"
    - ".venv/**/*"
