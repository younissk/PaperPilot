# GitHub Actions workflow for deploying PaperPilot Azure Functions
# Docs: https://learn.microsoft.com/en-us/azure/azure-functions/functions-how-to-github-actions

name: Deploy Azure Functions

on:
  push:
    branches:
      - master
    paths:
      - 'azure-functions/**'
      - '.github/workflows/azure-functions-deploy.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  AZURE_FUNCTIONAPP_NAME: 'paperpilot-api'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Build and Deploy (combined for simplicity)
  # ============================================================================
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'production'
      url: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: azure-functions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (optional)
        working-directory: azure-functions
        continue-on-error: true
        run: |
          pip install ruff
          ruff check function_app.py || true

      # Package dependencies for Azure (critical for Consumption plan)
      - name: Package dependencies
        working-directory: azure-functions
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: paperpilot-api
          package: ./azure-functions
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Verify deployment
        run: |
          echo "Deployed to: https://paperpilot-api-f4b7f6dch7atchb5.germanywestcentral-01.azurewebsites.net"
          sleep 15
          curl -sf "https://paperpilot-api-f4b7f6dch7atchb5.germanywestcentral-01.azurewebsites.net/api/health" && echo "Health check passed!" || echo "Health check pending (may take a minute to warm up)..."
